name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget \
            file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            patchelf
      - run: npm ci || npm install
      - name: Frontend build
        run: npm run build
      - name: Cargo check
        working-directory: src-tauri
        run: cargo check
      - name: Tauri DEB (smoke)
        run: npm run tauri -- build --bundles deb
      - uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci || npm install
      - name: Build Tauri (NSIS + MSI)
        run: npm run tauri -- build --bundles nsis,msi
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/magicpad-companion.exe
          if-no-files-found: error
