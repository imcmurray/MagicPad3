name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to create/publish (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci || npm install
      - name: Build Tauri (NSIS + MSI)
        run: npm run tauri -- build --bundles nsis,msi
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/magicpad-companion.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget \
            file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            patchelf
      - run: npm ci || npm install
      - run: npm run tauri -- build --bundles deb
      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

  publish:
    needs: [windows, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect release files
        run: |
          mkdir -p dist-release
          find artifacts -type f \( -name '*.exe' -o -name '*.msi' -o -name '*.deb' \) -print -exec cp -v {} dist-release/ \;
          ls -lah dist-release
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: MagicPad Companion ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: true
          generate_release_notes: true
          body: |
            ## Home PC testing build

            ### Windows 11
            1. Download the **NSIS** `.exe` installer (or portable `magicpad-companion.exe`).
            2. SmartScreen may warn (unsigned app) → More info → Run anyway.
            3. For Precision gestures, also install the **Microsoft-signed** trackpad driver
               from [vitoplantamura/MagicTrackpad2ForWindows](https://github.com/vitoplantamura/MagicTrackpad2ForWindows/releases)
               into `%LOCALAPPDATA%\MagicPadCompanion\drivers\` then **Driver → Install** in the app.

            Full guide: [docs/windows-install.md](https://github.com/imcmurray/MagicPad3/blob/main/docs/windows-install.md)

            ### Linux
            Install the `.deb` or build from source (see README).
          files: dist-release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
